{% extends 'base.html' %}

{% block content %}
<section class="py-10 bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4">
    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Edit Profile</h2>

      <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <!-- Profile Picture Upload -->
        <div class="flex items-center space-x-6">
          <img src="{{ user_data.image.url }}" alt="Profile Picture" class="w-24 h-24 rounded-full shadow-md">
          <div>
            <label class="block text-sm font-semibold text-gray-600">Change Profile Picture</label>
            <input type="file" name="image" class="block w-full text-sm text-gray-500 border rounded-lg cursor-pointer focus:outline-none file:bg-blue-500 file:text-white file:py-2 file:px-4 file:rounded-md file:cursor-pointer">
          </div>
        </div>

        <!-- Name & Role -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-600">Full Name</label>
            <input type="text" name="username" value="{{ user_data.user.username }}" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-600">Role</label>
            <select name="role" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
              {% for value, label in user_data.ROLE_CHOICES %}
              <option value="{{ value }}" {% if user_data.role == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Contact Information -->
        <div>
          <label class="block text-sm font-semibold text-gray-600">Phone Number</label>
          <input type="text" name="phone_number" value="{{ user_data.phone_number }}" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-600">Email</label>
          <input type="email" name="email" value="{{ user_data.email }}" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-600">Address</label>
          <textarea name="address" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">{{ user_data.address }}</textarea>
        </div>

        <!-- Skills -->
        <div>
          <label class="block text-sm font-semibold text-gray-600">Skills</label>
          <select name="skills" multiple class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
            {% for skill in all_skills %}
            <option value="{{ skill.id }}" {% if skill in user_data.skills.all %}selected{% endif %}>{{ skill.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Certifications -->
        <div>
          <label class="block text-sm font-semibold text-gray-600">Certifications</label>
          <select name="certifications" multiple class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
            {% for cert in all_certifications %}
            <option value="{{ cert.id }}" {% if cert in user_data.certifications.all %}selected{% endif %}>{{ cert.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Achievements -->
        <div>
          <label class="block text-sm font-semibold text-gray-600">Achievements</label>
          <select name="achievements" multiple class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
            {% for achievement in all_achievements %}
            <option value="{{ achievement.id }}" {% if achievement in user_data.achievements.all %}selected{% endif %}>{{ achievement.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Experience & Rating -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-600">Experience (Years)</label>
            <input type="number" name="experience_years" value="{{ user_data.experience_years }}" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-600">Rating</label>
            <input type="number" step="0.1" name="rating" value="{{ user_data.rating }}" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-blue-300">
          </div>
        </div>

        <!-- Save Button -->
        <div class="text-center">
          <button type="submit" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 transition duration-200">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
