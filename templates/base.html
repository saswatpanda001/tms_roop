{% load static %}
{% load i18n %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talent Management System</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Logo -->
        <div class="flex-shrink-0">
          <a href="/" class="text-2xl font-bold text-blue-600">TalentHub</a>
        </div>
        <!-- Links -->
        <div class="hidden md:flex space-x-6">
          {% if user.is_authenticated %}
          <a href="{% url 'main:dashboard' %}" class="text-gray-700 hover:text-blue-600 font-medium">Dashboard</a>
          <a href="{% url 'main:emp_profile' pk=user.id %}" class="text-gray-700 hover:text-blue-600 font-medium">Profile</a>
          <a href="{% url 'main:emp_list' %}" class="text-gray-700 hover:text-blue-600 font-medium">EmployeeList</a>
          
          <a href="{% url 'main:emp_skillgap' pk=user.id %}" class="text-gray-700 hover:text-blue-600 font-medium">Skillgap</a>
          <a href="{% url 'main:emp_training' pk=user.id %}" class="text-gray-700 hover:text-blue-600 font-medium">Trainings</a>
          {% endif %}
          
        
        </div>
        <!-- Profile Section -->
        <div class="ml-4 relative">
          <button class="flex items-center text-gray-600 hover:text-blue-600 focus:outline-none">
        
            <span class="ml-2 hidden md:block font-medium">{{user.username}}</span>
          </button>
        </div>
        <!-- Hamburger Menu -->
        <div class="flex md:hidden">
          <button id="mobile-menu-btn" class="text-gray-600 hover:text-blue-600 focus:outline-none">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16m-7 6h7"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden">
      <div class="px-2 pt-2 pb-3 space-y-1">
        <a href="/" class="block px-3 py-2 text-gray-700 hover:bg-gray-100">Dashboard</a>
        <a href="/talents" class="block px-3 py-2 text-gray-700 hover:bg-gray-100">Talents</a>
        <a href="/jobs" class="block px-3 py-2 text-gray-700 hover:bg-gray-100">Jobs</a>
        <a href="/analytics" class="block px-3 py-2 text-gray-700 hover:bg-gray-100">Analytics</a>
      </div>
    </div>
  </nav>

  {% block content %}
  {% endblock %}




  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <p class="text-center">&copy; 2025 TalentHub. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
